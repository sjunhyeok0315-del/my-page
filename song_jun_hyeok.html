<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송준혁 | 전기공학과 학생 소개</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --secondary-blue: #e7f1ff;
            --text-dark: #333;
            --bg-white: #ffffff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-white);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
            border: 1px solid var(--secondary-blue);
            text-align: center;
        }

        header h1 {
            color: var(--primary-blue);
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .profile-info {
            background-color: var(--secondary-blue);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .profile-info p {
            font-size: 1.25rem;
            margin: 10px 0;
            line-height: 1.6;
        }

        .profile-info strong {
            color: var(--primary-blue);
        }

        .intro-section {
            margin-top: 30px;
            text-align: left;
        }

        .intro-section h2 {
            color: var(--primary-blue);
            border-left: 5px solid var(--primary-blue);
            padding-left: 15px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
        }

        .hobby-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 480px) {
            header h1 {
                font-size: 2rem;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>전기공학과 송준혁</h1>
    </header>

    <div class="profile-info">
        <p><strong>학과 :</strong> 전기공학과</p>
        <p><strong>학번 :</strong> 202510872</p>
        <p><strong>이름 :</strong> 송준혁</p>
    </div>

    <div class="intro-section">
        <h2>자기소개</h2>
        <p class="intro-text">
            안녕하세요! 에너지를 다루는 공학의 정수, 전기공학과에 재학 중인 송준혁입니다. 
            현대 문명의 혈관과 같은 전기에 대해 배우며 더 나은 미래를 설계하고 싶습니다.
        </p>
        
        <h2>취미</h2>
        <div class="hobby-tags">
            <span class="tag">#게임</span>
            <span class="tag">#유튜브</span>
            <span class="tag">#전기공학</span>
        </div>
    </div>

    <footer>
        &copy; 2026 Song Jun-hyuk. All rights reserved.
    </footer>
</div>

</body>
</html>
